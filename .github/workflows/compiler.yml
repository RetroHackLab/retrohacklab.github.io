- name: Dynamically Scan and Generate Indexes
      run: |
        # 1. Installer uniquement bzip2 (ultra rapide, pas besoin de dpkg-dev)
        sudo apt-get update && sudo apt-get install -y bzip2

        # 2. On supprime SEULEMENT les anciennes compressions et le vieux Release
        # (On GARDE le fichier Packages original pour ne pas le perdre !)
        rm -f Packages.gz Packages.bz2 Release

        # 3. Création du fichier Release officiel épuré (sans Components)
        echo "Origin: Retro HackLab's Repo" > Release
        echo "Label: Retro HackLab's Repo" >> Release
        echo "Suite: stable" >> Release
        echo "Version: 1.0.0" >> Release
        echo "Codename: ios" >> Release
        echo "Architectures: iphoneos-arm" >> Release
        echo "Description: Welcome to Retro HackLab's Repo" >> Release

        # 4. Compression stricte et forcée pour Cydia
        gzip -9fk Packages
        bzip2 -9fk Packages
