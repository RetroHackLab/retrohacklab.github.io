name: Compiler and Deploy Repo

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write
  pages: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Dynamically Scan and Generate Indexes
      run: |
        sudo apt-get update && sudo apt-get install -y bzip2
        rm -f Packages.gz Packages.bz2 Release
        echo "Origin: Retro HackLab's Repo" > Release
        echo "Label: Retro HackLab's Repo" >> Release
        echo "Suite: stable" >> Release
        echo "Version: 1.0.0" >> Release
        echo "Codename: ios" >> Release
        echo "Architectures: iphoneos-arm" >> Release
        echo "Description: Welcome to Retro HackLab's Repo" >> Release
        gzip -9fk Packages
        bzip2 -9fk Packages

    - name: Upload and Push Generated Files to Main Branch
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add -f Packages Packages.gz Packages.bz2 Release
        git commit -m "Autogen: Force push updated indexes (.bz2, .gz, Release) [skip ci]" || echo "Aucun changement à commit."
        git push origin main

    - name: Setup Pages
      uses: actions/configure-pages@v5

    - name: Upload Artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'

    - name: Deploy to GitHub Pages
      uses: actions/deploy-pages@v4
